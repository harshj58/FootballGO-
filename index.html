<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football GO! | Pro Attax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pitch: #00ff87; --gold: #f1c40f; --navy: #021928; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Oswald', sans-serif; }
        body { background-color: #021928; color: white; }

        /* Navigation */
        header { background: #05293e; padding: 15px 5%; border-bottom: 3px solid var(--pitch); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 900; color: var(--pitch); font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Search Bubble */
        .search-bubble { background: white; border-radius: 50px; display: flex; align-items: center; padding: 5px 20px; width: 100%; max-width: 400px; }
        .search-bubble input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; color: #333; font-weight: bold; font-size: 1rem; }
        .search-bubble i { color: #021928; }

        /* Grid */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        /* Realistic Card Design */
        .card { 
            background: #05293e; 
            border-radius: 20px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--pitch); box-shadow: 0 0 30px rgba(0, 255, 135, 0.3); }
        
        .card-img { width: 100%; height: 320px; background: #000; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Stat Overlays on Card */
        .card-stats { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; text-align: center; }
        .card-stats h3 { font-size: 1.5rem; text-transform: uppercase; color: var(--pitch); }
        .card-tag { font-size: 0.7rem; color: var(--gold); font-weight: bold; letter-spacing: 2px; }

        /* Modal Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #05293e; width: 100%; max-width: 850px; border-radius: 40px; border: 4px solid var(--pitch); display: flex; overflow: hidden; position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: white; z-index: 10; }
        
        .modal-left { flex: 1; background: #000; height: 500px; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        
        .modal-right { flex: 1.2; padding: 45px; display: flex; flex-direction: column; justify-content: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(0,255,135,0.3); }
        .stat-val { font-size: 2.5rem; font-weight: 900; color: var(--pitch); display: block; line-height: 1; }
        .stat-label { font-size: 0.8rem; color: #8eb7d0; text-transform: uppercase; margin-top: 5px; display: block; }

        footer { text-align: center; padding: 40px; color: #8eb7d0; opacity: 0.5; }
        @media (max-width: 768px) { .modal-box { flex-direction: column; } .modal-left { height: 350px; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">FOOTBALL GO!</div>
        <div class="search-bubble">
            <input type="text" id="sInput" placeholder="Find Player..." onkeyup="doSearch()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</header>

<main>
    <div class="grid" id="mainGrid"></div>
</main>

<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeM()">&times;</span>
        <div class="modal-left"><img id="mImg" src=""></div>
        <div class="modal-right" id="mText"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Football GO! | Copyright harshj58</p>
</footer>

<script>
    // Real, High-Quality Stock Images of Football/Players (Designed for Development)
    const players = [
        { id: 1, name: "Lionel Messi", atk: 99, def: 45, spd: 88, tag: "WORLD LEGEND", img: "https://images.unsplash.com/photo-1518091043644-c1d445bcc97a?auto=format&fit=crop&w=600&q=80" },
        { id: 2, name: "Cristiano Ronaldo", atk: 98, def: 40, spd: 91, tag: "STRIKER FORCE", img: "https://images.unsplash.com/photo-1552318975-275e057f3a0d?auto=format&fit=crop&w=600&q=80" },
        { id: 3, name: "Kylian Mbappé", atk: 97, def: 38, spd: 99, tag: "SPEED KING", img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=600&q=80" },
        { id: 4, name: "Erling Haaland", atk: 98, def: 42, spd: 89, tag: "GOAL MACHINE", img: "https://images.unsplash.com/photo-1510567198184-c7484601c4b8?auto=format&fit=crop&w=600&q=80" },
        { id: 5, name: "Mohamed Salah", atk: 95, def: 44, spd: 93, tag: "WINGER ELITE", img: "https://images.unsplash.com/photo-1516567727245-ad8c68f3ec93?auto=format&fit=crop&w=600&q=80" },
        { id: 6, name: "Virgil Van Dijk", atk: 58, def: 98, spd: 79, tag: "DEFENSIVE WALL", img: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?auto=format&fit=crop&w=600&q=80" },
        { id: 7, name: "Neymar Jr", atk: 94, def: 32, spd: 87, tag: "SKILL MASTER", img: "https://images.unsplash.com/photo-1560272564-c83d66b1ad12?auto=format&fit=crop&w=600&q=80" },
        { id: 8, name: "Jude Bellingham", atk: 90, def: 85, spd: 82, tag: "GOLDEN BOY", img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=600&q=80" }
    ];

    function render(list) {
        document.getElementById('mainGrid').innerHTML = list.map(p => `
            <div class="card" onclick="openM(${p.id})">
                <div class="card-img">
                    <img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1556056504-517173f4aa07?w=600'">
                    <div class="card-stats">
                        <span class="card-tag">${p.tag}</span>
                        <h3>${p.name}</h3>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function doSearch() {
        const val = document.getElementById('sInput').value.toLowerCase();
        const filtered = players.filter(p => p.name.toLowerCase().includes(val));
        render(filtered);
    }

    function openM(id) {
        const p = players.find(x => x.id === id);
        const modal = document.getElementById('modal');
        document.getElementById('mImg').src = p.img;
        document.getElementById('mText').innerHTML = `
            <span style="color:var(--gold); letter-spacing:3px; font-weight:bold;">${p.tag}</span>
            <h2 style="font-size:3.5rem; color:var(--pitch); line-height:1; margin:10px 0;">${p.name}</h2>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-val">${p.atk}</span><span class="stat-label">Attack</span></div>
                <div class="stat-box"><span class="stat-val">${p.def}</span><span class="stat-label">Defense</span></div>
                <div class="stat-box"><span class="stat-val">${p.spd}</span><span class="stat-label">Speed</span></div>
                <div class="stat-box"><span class="stat-val">${p.atk + p.def}</span><span class="stat-label">Power</span></div>
            </div>
        `;
        modal.style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeM(); }
    render(players);
</script>
</body>
</html>
