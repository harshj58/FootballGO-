<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football GO! | Pro Hub</title>
    <style>
        :root { --pitch: #00ff87; --dark: #021928; --gold: #f1c40f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
        body { background: var(--dark); color: white; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--pitch); padding-bottom: 10px; }
        .logo { color: var(--pitch); font-size: 2rem; letter-spacing: -1px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* The Bubble Card */
        .card { 
            background: #05293e; 
            border-radius: 25px; 
            overflow: hidden; 
            border: 2px solid #0a3d5c;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .card:hover { transform: scale(1.03); border-color: var(--pitch); box-shadow: 0 0 20px rgba(0,255,135,0.3); }

        .img-box { 
            width: 100%; 
            height: 280px; 
            background: radial-gradient(circle, #1e5a7d 0%, #021928 100%);
            display: flex;
            align-items: flex-end; /* Aligns player feet/bottom to card bottom */
            justify-content: center;
            overflow: hidden;
        }
        .img-box img { 
            width: 90%; 
            height: 90%; 
            object-fit: contain; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .info { padding: 15px; text-align: center; background: rgba(0,0,0,0.3); }
        .info h3 { font-size: 1.2rem; color: var(--pitch); text-transform: uppercase; }
        .stats-row { display: flex; justify-content: space-around; margin-top: 10px; font-size: 0.8rem; color: var(--gold); }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #05293e; border: 3px solid var(--pitch); border-radius: 30px; max-width: 500px; width: 100%; padding: 30px; text-align: center; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="logo">FOOTBALL GO!</h1>
</div>

<div class="grid" id="cardGrid"></div>

<div class="modal" id="pModal">
    <div class="modal-content">
        <span class="close" onclick="closeM()">&times;</span>
        <div id="mBody"></div>
    </div>
</div>

<script>
    // Using TheSportsDB IDs - These are "Cut-out" photos designed for apps.
    // They are much more likely to load than raw news site photos.
    const players = [
        { name: "Lionel Messi", atk: 99, def: 44, img: "https://www.thesportsdb.com/images/media/player/render/9ovpda1521114519.png" },
        { name: "Cristiano Ronaldo", atk: 98, def: 40, img: "https://www.thesportsdb.com/images/media/player/render/43v0it1546700812.png" },
        { name: "Erling Haaland", atk: 97, def: 42, img: "https://www.thesportsdb.com/images/media/player/render/v672h61601035532.png" },
        { name: "Kevin De Bruyne", atk: 94, def: 65, img: "https://www.thesportsdb.com/images/media/player/render/9m6l151523455610.png" },
        { name: "Mohamed Salah", atk: 95, def: 45, img: "https://www.thesportsdb.com/images/media/player/render/f87fpe1522061298.png" },
        { name: "Kylian Mbappe", atk: 96, def: 38, img: "https://www.thesportsdb.com/images/media/player/render/4vuxy11516223595.png" },
        { name: "Virgil van Dijk", atk: 60, def: 98, img: "https://www.thesportsdb.com/images/media/player/render/640h161523452243.png" },
        { name: "Jude Bellingham", atk: 91, def: 84, img: "https://www.thesportsdb.com/images/media/player/render/2d5v4y1671991822.png" }
    ];

    const grid = document.getElementById('cardGrid');

    players.forEach((p, idx) => {
        grid.innerHTML += `
            <div class="card" onclick="openM(${idx})">
                <div class="img-box">
                    <img src="${p.img}" alt="${p.name}" onerror="handleError(this)">
                </div>
                <div class="info">
                    <h3>${p.name}</h3>
                    <div class="stats-row">
                        <span>ATK: ${p.atk}</span>
                        <span>DEF: ${p.def}</span>
                    </div>
                </div>
            </div>
        `;
    });

    // If an image still fails, it shows a generic player silhouette
    function handleError(img) {
        img.src = "https://www.thesportsdb.com/images/media/player/render/player_silhouette.png";
    }

    function openM(idx) {
        const p = players[idx];
        document.getElementById('mBody').innerHTML = `
            <img src="${p.img}" style="width:200px; margin-bottom:20px;">
            <h2 style="color:var(--pitch); font-size:2rem;">${p.name}</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                <div style="background:#021928; padding:15px; border-radius:15px;">
                    <p style="font-size:2rem;">${p.atk}</p>
                    <p style="font-size:0.7rem; color:var(--gold);">ATTACK</p>
                </div>
                <div style="background:#021928; padding:15px; border-radius:15px;">
                    <p style="font-size:2rem;">${p.def}</p>
                    <p style="font-size:0.7rem; color:var(--gold);">DEFENSE</p>
                </div>
            </div>
        `;
        document.getElementById('pModal').style.display = 'flex';
    }

    function closeM() { document.getElementById('pModal').style.display = 'none'; }
</script>
</body>
</html>
