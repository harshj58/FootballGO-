<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football GO! | Attax Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pitch-green: #2ecc71; --grass-dark: #27ae60; --gold: #f1c40f; --night: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Oswald', sans-serif; }
        body { background-color: #f4f4f4; color: #333; }

        /* Header & Navigation */
        header { background: var(--night); padding: 15px 5%; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 900; color: var(--pitch-green); font-size: 1.8rem; text-decoration: none; text-transform: uppercase; }
        .logo i { color: var(--gold); }

        /* Search Bubble */
        .search-bubble { background: #fff; border-radius: 50px; display: flex; align-items: center; padding: 4px 18px; width: 100%; max-width: 450px; border: 3px solid var(--pitch-green); }
        .search-bubble input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; font-size: 1rem; font-weight: bold; }
        .search-bubble button { border: none; background: transparent; cursor: pointer; color: var(--grass-dark); font-size: 1.2rem; }

        /* Main Content */
        main { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        /* Football Card Bubble */
        .card { background: #fff; border-radius: 30px; overflow: hidden; cursor: pointer; transition: 0.4s; box-shadow: 0 8px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; border: 2px solid #ddd; }
        .card:hover { transform: translateY(-12px) rotate(1deg); border-color: var(--gold); box-shadow: 0 20px 40px rgba(46, 204, 113, 0.3); }
        .card-img { width: 100%; height: 250px; background: linear-gradient(to bottom, #eee, #fff); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card-content { padding: 25px; background: #fff; text-align: center; }
        .player-tag { font-size: 0.8rem; font-weight: bold; color: #fff; background: var(--grass-dark); padding: 4px 12px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
        .card-content h3 { font-size: 1.5rem; text-transform: uppercase; margin-bottom: 5px; color: var(--night); }

        /* Modal / Stats View */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: #fff; width: 100%; max-width: 800px; border-radius: 40px; display: flex; overflow: hidden; position: relative; animation: kickIn 0.4s ease; border: 5px solid var(--gold); }
        @keyframes kickIn { from { transform: scale(0.5) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: var(--night); background: #fff; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .modal-left { flex: 1; background: #222; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
        .modal-right { flex: 1.2; padding: 40px; background: #fff; }
        
        /* Stats Styling */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center; border: 2px solid #eee; }
        .stat-val { font-size: 1.8rem; font-weight: 900; color: var(--grass-dark); display: block; }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #888; font-weight: bold; }

        footer { text-align: center; padding: 40px; background: var(--night); color: #fff; margin-top: 50px; }
        @media (max-width: 768px) { .modal-box { flex-direction: column; } .modal-left { height: 300px; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-futbol"></i>
            <span>Football GO!</span>
        </div>
        <div class="search-bubble">
            <input type="text" id="playerSearch" placeholder="Search Player (e.g. Messi, Ronaldo)">
            <button onclick="searchPlayer()"><i class="fas fa-search"></i></button>
        </div>
    </div>
</header>

<main>
    <h2 style="margin-bottom:30px; text-transform: uppercase; letter-spacing: 2px;">Trending News & Attax Cards</h2>
    <div class="news-grid" id="mainGrid"></div>
</main>

<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-left"><img id="modalImg" src=""></div>
        <div class="modal-right" id="modalContent"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Football GO! | Copyright harshj58</p>
</footer>

<script>
    // REAL FOOTBALL DATA (Attax Style)
    const cards = [
        { id: 1, type: 'news', tag: 'TRANSFER', name: 'Haaland to Madrid?', img: 'https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=800', desc: 'Rumors swirl as the Norwegian striker is spotted in Spain.', long: 'The football world is in shock as Erling Haaland reportedly met with Madrid officials. A record-breaking 250M deal is being discussed for the 2026 summer window.' },
        { id: 2, type: 'player', tag: 'LEGEND', name: 'Lionel Messi', img: 'https://images.unsplash.com/photo-1518091043644-c1d445bcc97a?w=800', atk: 99, def: 45, spd: 88, desc: 'The GOAT Attax card with maximum playmaking stats.' },
        { id: 3, type: 'player', tag: 'STRIKER', name: 'Cristiano Ronaldo', img: 'https://images.unsplash.com/photo-1552318975-275e057f3a0d?w=800', atk: 98, def: 40, spd: 92, desc: 'A power-packed finisher for any starting eleven.' },
        { id: 4, type: 'news', tag: 'WORLD CUP', name: '2026 Stadiums Ready', img: 'https://images.unsplash.com/photo-1522778119026-d647f0596c20?w=800', desc: 'Final inspections complete for the upcoming global tournament.', long: 'All venues for the 2026 World Cup have passed safety inspections. Technology upgrades include 360-degree holographic replays for fans.' },
        { id: 5, type: 'player', tag: 'MIDFIELD', name: 'Kevin De Bruyne', img: 'https://images.unsplash.com/photo-1510567198184-c7484601c4b8?w=800', atk: 94, def: 65, spd: 76, desc: 'The ultimate assist king with pinpoint passing accuracy.' },
        { id: 6, type: 'player', tag: 'DEFENSE', name: 'Virgil Van Dijk', img: 'https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=800', atk: 55, def: 97, spd: 78, desc: 'An immovable wall for your defensive line.' }
    ];

    function renderCards(items) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = items.map(item => `
            <div class="card" onclick="openModal(${item.id})">
                <div class="card-img"><img src="${item.img}"></div>
                <div class="card-content">
                    <span class="player-tag">${item.tag}</span>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                </div>
            </div>
        `).join('');
    }

    function searchPlayer() {
        const q = document.getElementById('playerSearch').value.toLowerCase().trim();
        const filtered = cards.filter(c => c.name.toLowerCase().includes(q));
        renderCards(filtered.length ? filtered : cards);
    }

    function openModal(id) {
        const item = cards.find(c => c.id === id);
        const modal = document.getElementById('modal');
        const content = document.getElementById('modalContent');
        const img = document.getElementById('modalImg');

        img.src = item.img;
        
        if(item.type === 'news') {
            content.innerHTML = `
                <span class="player-tag" style="background:var(--night)">${item.tag}</span>
                <h2 style="font-size:2.5rem; margin:10px 0;">${item.name}</h2>
                <p style="line-height:1.6; color:#555; font-size:1.1rem;">${item.long}</p>
            `;
        } else {
            content.innerHTML = `
                <span class="player-tag">${item.tag}</span>
                <h2 style="font-size:2.5rem; margin:5px 0;">${item.name}</h2>
                <div class="stat-grid">
                    <div class="stat-card"><span class="stat-val">${item.atk}</span><span class="stat-label">Attack</span></div>
                    <div class="stat-card"><span class="stat-val">${item.def}</span><span class="stat-label">Defense</span></div>
                    <div class="stat-card"><span class="stat-val">${item.spd}</span><span class="stat-label">Speed</span></div>
                    <div class="stat-card"><span class="stat-val">${item.atk + item.def}</span><span class="stat-label">Total Power</span></div>
                </div>
                <p style="margin-top:20px; color:#777;">Attax Card rarity: Legendary Gold Foil. Perfect for competitive play in the Football GO! league.</p>
            `;
        }
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeModal(); }
    
    renderCards(cards);
</script>
</body>
</html>
