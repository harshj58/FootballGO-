<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football GO! | Attax Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pitch: #00ff87; --gold: #f1c40f; --navy: #021928; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #021928; color: white; overflow-x: hidden; }

        /* Navigation */
        header { background: #05293e; padding: 15px 5%; border-bottom: 3px solid var(--pitch); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 900; color: var(--pitch); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }

        /* Search Bubble */
        .search-bubble { background: white; border-radius: 50px; display: flex; align-items: center; padding: 5px 20px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0,255,135,0.2); }
        .search-bubble input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; color: #333; font-weight: bold; }
        .search-bubble i { color: #021928; font-size: 1.2rem; }

        /* Grid */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }

        /* Football Card Bubble */
        .card { 
            background: linear-gradient(135deg, #0a3d5c 0%, #021928 100%); 
            border-radius: 30px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid #0a3d5c; 
            position: relative;
            text-align: center;
        }
        .card:hover { transform: translateY(-10px) scale(1.05); border-color: var(--pitch); box-shadow: 0 0 30px rgba(0, 255, 135, 0.5); }
        
        /* Fixed Image Container */
        .card-img { width: 100%; height: 240px; background: radial-gradient(circle, #1e5a7d 0%, #021928 100%); padding: 20px; display: flex; align-items: center; justify-content: center; }
        .card-img img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }

        .card-body { padding: 20px; background: rgba(0,0,0,0.2); }
        .card-body h3 { font-size: 1.3rem; color: var(--pitch); text-transform: uppercase; margin-bottom: 5px; }
        .card-body .type { font-size: 0.7rem; color: var(--gold); font-weight: bold; letter-spacing: 1px; }

        /* Modal View */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #05293e; width: 100%; max-width: 800px; border-radius: 40px; border: 4px solid var(--pitch); display: flex; overflow: hidden; position: relative; box-shadow: 0 0 50px rgba(0,255,135,0.3); }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: white; z-index: 10; transition: 0.3s; }
        .close:hover { color: var(--pitch); transform: rotate(90deg); }
        
        .modal-left { flex: 1; background: radial-gradient(circle, #1e5a7d 0%, #000 100%); display: flex; align-items: center; justify-content: center; padding: 40px; }
        .modal-left img { width: 100%; max-height: 400px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(0,255,135,0.4)); }
        
        .modal-right { flex: 1.2; padding: 45px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(0,255,135,0.2); text-align: center; }
        .stat-val { font-size: 2.2rem; font-weight: 900; color: var(--pitch); display: block; line-height: 1; }
        .stat-label { font-size: 0.7rem; color: #8eb7d0; text-transform: uppercase; font-weight: bold; margin-top: 5px; display: block; }

        footer { text-align: center; padding: 40px; color: #8eb7d0; opacity: 0.6; font-size: 0.8rem; }
        @media (max-width: 700px) { .modal-box { flex-direction: column; } .modal-left { padding: 20px; height: 300px; } }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo"><i class="fas fa-futbol"></i> Football GO!</div>
        <div class="search-bubble">
            <input type="text" id="sInput" placeholder="Search Player Attax..." onkeyup="doSearch()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</header>

<main>
    <div class="grid" id="mainGrid"></div>
</main>

<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeM()">&times;</span>
        <div class="modal-left"><img id="mImg" src=""></div>
        <div class="modal-right" id="mText"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Football GO! | Official Trading Card Hub | Copyright harshj58</p>
</footer>

<script>
    // These are high-reliability Sports Avatar URLs designed for web apps
    const players = [
        { id: 1, name: "Lionel Messi", atk: 99, def: 45, spd: 88, type: "Legendary Card", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Messi&backgroundColor=05293e&clothingColor=3c4ccf" },
        { id: 2, name: "C. Ronaldo", atk: 98, def: 40, spd: 92, type: "Power Striker", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ronaldo&backgroundColor=05293e&clothingColor=ff0000" },
        { id: 3, name: "K. Mbappe", atk: 97, def: 35, spd: 99, type: "Speed Demon", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Mbappe&backgroundColor=05293e&clothingColor=001f3f" },
        { id: 4, name: "Erling Haaland", atk: 98, def: 42, spd: 90, type: "Goal Machine", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Haaland&backgroundColor=05293e&clothingColor=69b3e7" },
        { id: 5, name: "Kevin De Bruyne", atk: 95, def: 60, spd: 78, type: "Master Midfielder", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kevin&backgroundColor=05293e&clothingColor=add8e6" },
        { id: 6, name: "V. Van Dijk", atk: 55, def: 98, spd: 80, type: "The Wall", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Virgil&backgroundColor=05293e&clothingColor=ff4b2b" },
        { id: 7, name: "Mo Salah", atk: 96, def: 45, spd: 93, type: "Egyptian King", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Salah&backgroundColor=05293e&clothingColor=dd0000" },
        { id: 8, name: "Harry Kane", atk: 94, def: 40, spd: 75, type: "Elite Finisher", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kane&backgroundColor=05293e&clothingColor=ffffff" }
    ];

    function render(list) {
        document.getElementById('mainGrid').innerHTML = list.map(p => `
            <div class="card" onclick="openM(${p.id})">
                <div class="card-img">
                    <img src="${p.img}" alt="${p.name}">
                </div>
                <div class="card-body">
                    <div class="type">${p.type}</div>
                    <h3>${p.name}</h3>
                </div>
            </div>
        `).join('');
    }

    function doSearch() {
        const val = document.getElementById('sInput').value.toLowerCase();
        const filtered = players.filter(p => p.name.toLowerCase().includes(val));
        render(filtered);
    }

    function openM(id) {
        const p = players.find(x => x.id === id);
        const modal = document.getElementById('modal');
        document.getElementById('mImg').src = p.img;
        document.getElementById('mText').innerHTML = `
            <span style="color:var(--gold); font-weight:bold; letter-spacing:2px; font-size:0.8rem;">${p.type}</span>
            <h2 style="font-size:2.8rem; color:var(--pitch); line-height:1.1; margin:10px 0;">${p.name}</h2>
            <p style="color:#8eb7d0;">Official Match Attax Data 2026</p>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-val">${p.atk}</span><span class="stat-label">Attack</span></div>
                <div class="stat-box"><span class="stat-val">${p.def}</span><span class="stat-label">Defense</span></div>
                <div class="stat-box"><span class="stat-val">${p.spd}</span><span class="stat-label">Speed</span></div>
                <div class="stat-box"><span class="stat-val">${Math.floor((p.atk + p.def + p.spd)/3)}</span><span class="stat-label">Avg Power</span></div>
            </div>
        `;
        modal.style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeM(); }
    render(players);
</script>
</body>
</html>
