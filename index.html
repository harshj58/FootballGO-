<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football GO! | Pro Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pitch: #00ff87; --navy: #021928; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--navy); }

        header { background: #fff; padding: 15px 5%; box-shadow: 0 2px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; }
        .logo { font-weight: 900; color: var(--navy); font-size: 1.8rem; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo i { color: var(--pitch); }

        .search-bubble { background: #f0f0f0; border-radius: 50px; display: flex; align-items: center; padding: 5px 20px; width: 100%; max-width: 400px; border: 2px solid transparent; transition: 0.3s; }
        .search-bubble:focus-within { border-color: var(--pitch); background: #fff; }
        .search-bubble input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; font-size: 1rem; }

        main { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .card { background: #fff; border-radius: 30px; overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-10px); border-color: var(--pitch); box-shadow: 0 15px 30px rgba(0,255,135,0.2); }
        .card.found { animation: highlight 1.5s ease; border: 4px solid var(--pitch); }
        @keyframes highlight { 0% { box-shadow: 0 0 0px var(--pitch); } 50% { box-shadow: 0 0 40px var(--pitch); } 100% { box-shadow: 0 0 0px var(--pitch); } }

        .card-img { width: 100%; height: 250px; background: #000; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img img { transform: scale(1.1); }

        .card-content { padding: 25px; text-align: center; }
        .card-content h3 { font-size: 1.4rem; margin-bottom: 5px; color: var(--navy); }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: #fff; width: 100%; max-width: 800px; border-radius: 40px; display: flex; overflow: hidden; position: relative; border: 5px solid var(--pitch); }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; cursor: pointer; color: var(--navy); }
        .modal-left { flex: 1; background: #000; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { flex: 1.2; padding: 45px; }
        .stat-box { display: inline-block; background: var(--navy); color: var(--pitch); padding: 10px 20px; border-radius: 15px; font-weight: 800; margin: 5px; font-size: 1.1rem; }

        footer { text-align: center; padding: 40px; background: var(--navy); color: #fff; margin-top: 50px; font-weight: bold; }
        @media (max-width: 750px) { .modal-box { flex-direction: column; } .modal-left { height: 250px; } }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="#" class="logo"><i class="fas fa-futbol"></i> Football GO!</a>
        <div class="search-bubble">
            <input type="text" id="searchInput" placeholder="Search Player (e.g. Messi)...">
            <button onclick="handleSearch()"><i class="fas fa-search"></i></button>
        </div>
    </div>
</header>

<main>
    <div class="news-grid" id="mainGrid"></div>
</main>

<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-left"><img id="modalImg" src=""></div>
        <div class="modal-right" id="modalBody"></div>
    </div>
</div>

<footer><p>&copy; 2026 Football GO! | Copyright harshj58</p></footer>

<script>
    // Using a reliable proxy service (wsrv.nl) to fetch images. This prevents Vercel blocks.
    const players = [
        { id: 1, name: "Lionel Messi", atk: 99, def: 45, img: "https://images.weserv.nl/?url=raw.githubusercontent.com/fedeperin/potter-api/main/public/images/characters/harry-potter.jpg&errorredirect=https://images.unsplash.com/photo-1518091043644-c1d445bcc97a?w=600", realImg: "https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/b/b4/Lionel-Messi-Argentina-2022-FIFA-World-Cup_%28cropped%29.jpg" },
        { id: 2, name: "Cristiano Ronaldo", atk: 98, def: 40, realImg: "https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/d/d7/Cristiano_Ronaldo_playing_for_Al_Nassr_FC_against_Al_Fateh_FC%2C_3_February_2023_%28cropped%29.jpg" },
        { id: 3, name: "Erling Haaland", atk: 97, def: 42, realImg: "https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/0/07/Erling_Haaland_2023_%28cropped%29.jpg" },
        { id: 4, name: "Kevin De Bruyne", atk: 94, def: 60, realImg: "https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/b/b4/Kevin_De_Bruyne_2023_%28cropped%29.jpg" },
        { id: 5, name: "Kylian Mbappe", atk: 97, def: 35, realImg: "https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/5/57/Kylian_Mbapp%C3%A9_2023_%28cropped%29.jpg" },
        { id: 6, name: "Virgil van Dijk", atk: 55, def: 98, realImg: "https://images.weserv.nl/?url=https://upload.wikimedia.org/wikipedia/commons/4/43/Virgil_van_Dijk_2023_%28cropped%29.jpg" }
    ];

    function renderCards(list) {
        document.getElementById('mainGrid').innerHTML = list.map(p => `
            <div class="card" id="card-${p.id}" onclick="openModal(${p.id})">
                <div class="card-img"><img src="${p.realImg}" onerror="this.src='https://placehold.jp/24/021928/00ff87/400x400.png?text=${p.name}'"></div>
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <p style="color:#777; font-weight:bold;">ATK: ${p.atk} | DEF: ${p.def}</p>
                </div>
            </div>
        `).join('');
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const foundPlayer = players.find(p => p.name.toLowerCase().includes(query));
        
        if (foundPlayer) {
            // Logic to scroll and highlight
            const el = document.getElementById(`card-${foundPlayer.id}`);
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('found');
            setTimeout(() => el.classList.remove('found'), 2000);
            openModal(foundPlayer.id); // Auto-pops the modal as you requested
        }
    }

    function openModal(id) {
        const p = players.find(x => x.id === id);
        document.getElementById('modalImg').src = p.realImg;
        document.getElementById('modalBody').innerHTML = `
            <h2 style="font-size:3rem; margin-bottom:10px;">${p.name}</h2>
            <p style="color:#666; margin-bottom:20px;">Official 2026 Attax Card. High-rarity Legendary edition.</p>
            <div class="stat-box">ATTACK: ${p.atk}</div>
            <div class="stat-box">DEFENSE: ${p.def}</div>
            <div class="stat-box">TOTAL: ${p.atk + p.def}</div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeModal(); }
    document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSearch(); });

    renderCards(players);
</script>
</body>
</html>
