<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football GO! | Attax Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pitch: #00ff87; --dark: #04f86d; --navy: #021928; --gold: #f1c40f; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #021928; color: white; }

        /* Navigation */
        header { background: #05293e; padding: 15px 5%; border-bottom: 3px solid var(--pitch); position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-weight: 900; color: var(--pitch); font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Search Bubble */
        .search-bubble { background: white; border-radius: 50px; display: flex; align-items: center; padding: 5px 20px; width: 100%; max-width: 400px; }
        .search-bubble input { border: none; background: transparent; padding: 10px; width: 100%; outline: none; color: #333; font-weight: bold; }
        .search-bubble i { color: #021928; }

        /* Grid */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }

        /* Football Card Bubble */
        .card { background: linear-gradient(135deg, #05293e 0%, #021928 100%); border-radius: 25px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 2px solid #0a3d5c; position: relative; }
        .card:hover { transform: scale(1.05); border-color: var(--pitch); box-shadow: 0 0 20px rgba(0, 255, 135, 0.4); }
        .card-img { width: 100%; height: 220px; position: relative; background: #0a3d5c; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; text-align: center; }
        .card-body h3 { font-size: 1.4rem; color: var(--pitch); text-transform: uppercase; }
        .card-body p { color: #8eb7d0; font-size: 0.9rem; margin-top: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #05293e; width: 100%; max-width: 800px; border-radius: 40px; border: 4px solid var(--pitch); display: flex; overflow: hidden; position: relative; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 2rem; cursor: pointer; color: white; z-index: 10; }
        .modal-left { flex: 1; background: #000; }
        .modal-left img { width: 100%; height: 100%; object-fit: cover; }
        .modal-right { flex: 1.2; padding: 40px; color: white; }

        /* Stats Card Inside Modal */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-box { background: #021928; padding: 15px; border-radius: 20px; border: 2px solid #0a3d5c; text-align: center; }
        .stat-val { font-size: 2rem; font-weight: 900; color: var(--pitch); display: block; }
        .stat-label { font-size: 0.8rem; color: #8eb7d0; text-transform: uppercase; }

        footer { text-align: center; padding: 40px; color: #8eb7d0; font-size: 0.9rem; }
        @media (max-width: 700px) { .modal-box { flex-direction: column; } .modal-left { height: 300px; } }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <div class="logo">FOOTBALL GO!</div>
        <div class="search-bubble">
            <input type="text" id="sInput" placeholder="Search Attax Cards..." onkeyup="doSearch()">
            <i class="fas fa-search"></i>
        </div>
    </div>
</header>

<main>
    <div class="grid" id="mainGrid"></div>
</main>

<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeM()">&times;</span>
        <div class="modal-left"><img id="mImg" src=""></div>
        <div class="modal-right" id="mText"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Football GO! | Copyright harshj58</p>
</footer>

<script>
    // These URLs use a "proxy" or reliable free hosts to ensure images load
    const players = [
        { id: 1, name: "Lionel Messi", atk: 99, def: 45, spd: 88, img: "https://images.unsplash.com/photo-1518091043644-c1d445bcc97a?auto=format&fit=crop&q=80&w=600" },
        { id: 2, name: "C. Ronaldo", atk: 98, def: 40, spd: 92, img: "https://images.unsplash.com/photo-1552318975-275e057f3a0d?auto=format&fit=crop&q=80&w=600" },
        { id: 3, name: "K. Mbappe", atk: 97, def: 35, spd: 99, img: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=600" },
        { id: 4, name: "Erling Haaland", atk: 98, def: 42, spd: 90, img: "https://images.unsplash.com/photo-1628891890467-b79f2c8ba9ed?auto=format&fit=crop&q=80&w=600" },
        { id: 5, name: "Kevin De Bruyne", atk: 95, def: 60, spd: 78, img: "https://images.unsplash.com/photo-1510567198184-c7484601c4b8?auto=format&fit=crop&q=80&w=600" },
        { id: 6, name: "V. Van Dijk", atk: 55, def: 98, spd: 80, img: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?auto=format&fit=crop&q=80&w=600" },
        { id: 7, name: "Neymar Jr", atk: 94, def: 30, spd: 86, img: "https://images.unsplash.com/photo-1560272564-c83d66b1ad12?auto=format&fit=crop&q=80&w=600" },
        { id: 8, name: "Mohamed Salah", atk: 96, def: 45, spd: 93, img: "https://images.unsplash.com/photo-1516567727245-ad8c68f3ec93?auto=format&fit=crop&q=80&w=600" }
    ];

    function render(list) {
        document.getElementById('mainGrid').innerHTML = list.map(p => `
            <div class="card" onclick="openM(${p.id})">
                <div class="card-img">
                    <img src="${p.img}" loading="lazy" onerror="this.src='https://placehold.jp/24/0a3d5c/ffffff/300x400.png?text=Football+Card'">
                </div>
                <div class="card-body">
                    <h3>${p.name}</h3>
                    <p>Click for Stats</p>
                </div>
            </div>
        `).join('');
    }

    function doSearch() {
        const val = document.getElementById('sInput').value.toLowerCase();
        const filtered = players.filter(p => p.name.toLowerCase().includes(val));
        render(filtered);
    }

    function openM(id) {
        const p = players.find(x => x.id === id);
        const modal = document.getElementById('modal');
        document.getElementById('mImg').src = p.img;
        document.getElementById('mText').innerHTML = `
            <h2 style="font-size:2.5rem; color:var(--pitch);">${p.name}</h2>
            <p style="margin-top:10px; color:#8eb7d0;">Official Football GO! Attax Series</p>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-val">${p.atk}</span><span class="stat-label">Attack</span></div>
                <div class="stat-box"><span class="stat-val">${p.def}</span><span class="stat-label">Defense</span></div>
                <div class="stat-box"><span class="stat-val">${p.spd}</span><span class="stat-label">Speed</span></div>
                <div class="stat-box"><span class="stat-val">${p.atk + p.def}</span><span class="stat-label">Overall</span></div>
            </div>
        `;
        modal.style.display = 'flex';
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target == document.getElementById('modal')) closeM(); }
    render(players);
</script>
</body>
</html>
